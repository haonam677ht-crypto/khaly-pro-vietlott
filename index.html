<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Khaly Pro Vietlott</title>
<style>
  :root { --bg: #090e1a; --card: #151d30; --accent: #ff1744; --text: #e0e0e0; --win: #ffeb3b; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; padding: 15px; margin: 0; }
  .container { max-width: 480px; margin: auto; }
  h2 { color: var(--accent); text-align: center; text-transform: uppercase; margin-bottom: 20px; font-weight: 800; }
  .tab-group { display: flex; gap: 10px; margin-bottom: 15px; }
  .tab-btn { flex: 1; padding: 12px; background: #2a3a5a; border: none; color: #fff; border-radius: 6px; cursor: pointer; }
  .tab-btn.active { background: var(--accent); color: #fff; font-weight: bold; }
  .box { background: var(--card); border: 1px solid #2a3a5a; padding: 15px; border-radius: 12px; margin-bottom: 15px; }
  h4 { margin-top: 0; margin-bottom: 15px; text-transform: uppercase; color: #aaa; font-size: 13px; }
  .predict-item { border-bottom: 1px solid #2a3a5a; padding: 10px 0; }
  .vip-style { border: 1px solid var(--accent); padding: 12px; border-radius: 8px; background: #250a0a; margin-bottom: 10px;}
  .ball { width: 30px; height: 30px; background: #1a2538; border: 1px solid var(--accent); color: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 13px; margin: 2px; }
  .ball.matched { background: var(--win); color: #000; border-color: var(--win); }
  input, textarea { background: #0c1220; border: 1px solid #2a3a5a; color: #fff; padding: 10px; border-radius: 6px; width: 100%; box-sizing: border-box; margin: 5px 0; }
  .grid-6 { display: grid; grid-template-columns: repeat(6, 1fr); gap: 5px; margin: 8px 0; }
  .grid-6 input { background: #0c1220; border: 1px solid var(--accent); text-align: center; font-weight: bold; padding: 8px 0; border-radius: 6px; color: var(--accent); }
  button { padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; width: 100%; margin: 5px 0; }
  .save { background: var(--accent); color: #fff; }
  .delete { background: #2a3a5a; color: #aaa; }
  .btn-paste { background: #1a2538; color: #fff; border: 1px solid #2a3a5a; }
  .win-tag { color: var(--win); font-weight: bold; font-size: 11px; display: block; }
</style>
</head>
<body>
<div class="container">
  <h2>Khaly Pro Vietlott</h2>
  <div id="schedule-box" style="background:#1a2538; border:1px solid var(--accent); padding:10px; border-radius:8px; text-align:center; margin-bottom:15px; color:var(--accent); font-weight:bold;"></div>
  
  <div class="tab-group">
    <button id="btn-mega" class="tab-btn active" onclick="switchType('mega')">MEGA 6/45</button>
    <button id="btn-power" class="tab-btn" onclick="switchType('power')">POWER 6/55</button>
  </div>
  
  <div id="predict-list" class="box"></div>
  
  <div id="cold-list-container"></div>

  <div class="box">
    <h4>⚙️ NHẬP LIỆU</h4>
    <input type="date" id="date-picker">
    <textarea id="pasteInput" placeholder="Dán chuỗi số tại đây... (Ví dụ: 02 15 24 33 40 45)"></textarea>
    <button class="btn-paste" onclick="pasteNumbers()">📥 Dán nhanh</button>
    <div class="grid-6" id="inputs-6"></div>
    <input type="number" id="input-bonus" placeholder="Số Bonus (Chỉ Power)" style="display:none; border-color:var(--accent); color:var(--accent);">
    <button class="save" onclick="saveData()">💾 Lưu kết quả kỳ này</button>
    <button class="delete" onclick="deleteData()">🗑 Xoá ngày đã chọn</button>
  </div>
  
  <div class="box">
    <h4>📜 LỊCH SỬ DỮ LIỆU & KIỂM ĐỊNH AI</h4>
    <div id="history-list" style="max-height: 350px; overflow-y: auto;"></div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
<script>
const firebaseConfig = { apiKey: "AIzaSyCT8UEFXvQEnr3j4tpH2SejMRsrVTUtHno", authDomain: "xoso-1c0bc.firebaseapp.com", projectId: "xoso-1c0bc", storageBucket: "xoso-1c0bc.appspot.com", messagingSenderId: "809250186083", appId: "1:809250186083:web:f190681f03347c696fe956" };
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let currentType = 'mega';
document.getElementById("date-picker").value = new Date().toISOString().slice(0, 10);
const inputsDiv = document.getElementById("inputs-6");
for(let i=0; i<6; i++){ let input = document.createElement("input"); input.type="number"; input.placeholder="00"; inputsDiv.appendChild(input); }

function updateSchedule() {
  const d = new Date().getDay();
  const days = ["Chủ Nhật", "Thứ Hai", "Thứ Ba", "Thứ Tư", "Thứ Năm", "Thứ Sáu", "Thứ Bảy"];
  
  let scheduleText = "";
  if ([3, 5, 0].includes(d)) {
    scheduleText = "MEGA 6/45 xổ";
  } else if ([2, 4, 6].includes(d)) {
    scheduleText = "POWER 6/55 xổ";
  } else {
    scheduleText = "Ngày nghỉ (Không xổ Mega/Power)";
  }

  document.getElementById("schedule-box").innerText = `Hôm nay ${days[d]} - ${scheduleText}`;
}
updateSchedule();

function switchType(type) {
  currentType = type;
  document.getElementById("btn-mega").classList.toggle("active", type === 'mega');
  document.getElementById("btn-power").classList.toggle("active", type === 'power');
  document.getElementById("input-bonus").style.display = type === 'power' ? 'block' : 'none';
  loadData();
}

function pasteNumbers() {
  let val = document.getElementById("pasteInput").value;
  let parts = val.match(/\d+/g) || [];
  let matches = [];
  parts.forEach(p => {
     if(p.length > 2) matches.push(...p.match(/\d{2}/g) || []);
     else matches.push(p);
  });
  
  document.querySelectorAll("#inputs-6 input").forEach((inp, idx) => {
     inp.value = matches[idx] ? parseInt(matches[idx]) : "";
  });
  if(currentType === 'power' && matches[6]) {
     document.getElementById("input-bonus").value = parseInt(matches[6]);
  }
}

async function saveData() {
  let date = document.getElementById("date-picker").value;
  let inputs = [...document.querySelectorAll("#inputs-6 input")].map(i => parseInt(i.value)).filter(x => !isNaN(x));
  if(inputs.length < 6) return alert("Nhập đủ 6 số!");
  await db.collection("vietlott_" + currentType).doc(date).set({ numbers: inputs.sort((a,b)=>a-b), bonus: parseInt(document.getElementById("input-bonus").value || 0) });
  alert("💾 Lưu thành công!");
}

async function deleteData() {
  let date = document.getElementById("date-picker").value;
  if(confirm("Xoá ngày "+date+"?")) await db.collection("vietlott_" + currentType).doc(date).delete();
}

function getPrize(count, isJP2) {
  if (currentType === 'mega') {
    if (count == 3) return "Trúng 3 số (30k)";
    if (count == 4) return "Trúng 4 số (300k)";
    if (count == 5) return "Trúng 5 số (10Tr)";
    if (count == 6) return "JACKPOT!";
  } else {
    if (count == 3) return "Trúng 3 số (50k)";
    if (count == 4) return "Trúng 4 số (500k)";
    if (count == 5 && !isJP2) return "Trúng 5 số (40Tr)";
    if (count == 5 && isJP2) return "JACKPOT 2! 🏆";
    if (count == 6) return "JACKPOT 1! 👑";
  }
  return "";
}

// ==========================================================
// 🚀 THUẬT TOÁN MỚI: TÍCH HỢP MONTE CARLO & MA TRẬN TRỌNG SỐ
// ==========================================================
function generate(dataMap, sortedDates, targetDate) {
  let maxLimit = currentType === 'mega' ? 45 : 55;
  
  // Trả về mặc định nếu chưa có dữ liệu
  if (sortedDates.length === 0) {
      return [Array.from({length:6}, (_,i)=>i+1), Array.from({length:6}, (_,i)=>i+2)];
  }

  let totalDraws = sortedDates.length;
  let targetMonth = new Date(targetDate).getMonth() + 1;

  // --- BƯỚC 1: KHỞI TẠO CÁC BỘ ĐẾM THỐNG KÊ ---
  let freq10 = {}, freq30 = {}, monthFreq = {};
  let posFreq = Array(6).fill(0).map(() => ({})); 
  let pairFreq = {}, tripleFreq = {}; 
  let gapData = {};

  for (let i = 1; i <= maxLimit; i++) {
      freq10[i] = 0; freq30[i] = 0; monthFreq[i] = 0;
      gapData[i] = { lastSeenIndex: -1, allGaps: [] };
      pairFreq[i] = {}; tripleFreq[i] = {};
  }

  let lastDrawNumbers = dataMap[sortedDates[totalDraws - 1]].numbers || [];

  // --- BƯỚC 2: QUÉT TOÀN BỘ LỊCH SỬ ĐỂ HUẤN LUYỆN AI ---
  sortedDates.forEach((d, drawIndex) => {
      let drawMonth = parseInt(d.split("-")[1]);
      let numbers = dataMap[d].numbers;
      if (!numbers || numbers.length !== 6) return;

      let isLast10 = drawIndex >= (totalDraws - 10);
      let isLast30 = drawIndex >= (totalDraws - 30);

      for (let i = 0; i < 6; i++) {
          let n1 = numbers[i];
          
          // Thống kê chu kỳ & vị trí
          if (isLast10) freq10[n1]++;
          if (isLast30) freq30[n1]++;
          if (drawMonth === targetMonth) monthFreq[n1]++;
          posFreq[i][n1] = (posFreq[i][n1] || 0) + 1;

          // Thống kê điểm rơi (Gap)
          if (gapData[n1].lastSeenIndex !== -1) {
              gapData[n1].allGaps.push(drawIndex - gapData[n1].lastSeenIndex);
          }
          gapData[n1].lastSeenIndex = drawIndex;

          // Thống kê Pairs (Cặp 2)
          for (let j = i + 1; j < 6; j++) {
              let n2 = numbers[j];
              pairFreq[n1][n2] = (pairFreq[n1][n2] || 0) + 1;
              pairFreq[n2][n1] = (pairFreq[n2][n1] || 0) + 1;

              // Thống kê Triples (Bộ 3)
              for (let k = j + 1; k < 6; k++) {
                  let n3 = numbers[k];
                  let triKey = [n1, n2, n3].sort((a,b)=>a-b).join('-');
                  tripleFreq[triKey] = (tripleFreq[triKey] || 0) + 1;
              }
          }
      }
  });

  // Xử lý điểm Gap (Chuẩn hoá để làm Trọng số)
  let gapScores = {};
  for (let i = 1; i <= maxLimit; i++) {
      let currentGap = gapData[i].lastSeenIndex === -1 ? totalDraws : (totalDraws - 1 - gapData[i].lastSeenIndex);
      let avgGap = gapData[i].allGaps.length > 0 ? gapData[i].allGaps.reduce((a, b) => a + b, 0) / gapData[i].allGaps.length : maxLimit;
      let gapDiff = Math.abs(currentGap - avgGap);
      gapScores[i] = Math.max(0, 10 - gapDiff); // Gần với nhịp gan trung bình -> Điểm cao
  }

  // --- BƯỚC 3: MONTE CARLO (SINH HÀNG CHỤC NGÀN BỘ SỐ VÀ LỌC BẰNG LUẬT CỨNG) ---
  let validTickets = [];
  let attempts = 0;
  let targetPoolSize = 5000; // Tập mẫu vé sẽ mang đi chấm điểm

  let midPoint = currentType === 'mega' ? 22 : 27;
  let minSum = currentType === 'mega' ? 90 : 110;
  let maxSum = currentType === 'mega' ? 150 : 180;

  function getRandomTicket() {
      let t = new Set();
      while(t.size < 6) t.add(Math.floor(Math.random() * maxLimit) + 1);
      return Array.from(t).sort((a,b)=>a-b);
  }

  while(validTickets.length < targetPoolSize && attempts < 50000) {
      attempts++;
      let t = getRandomTicket();

      // Luật 1: Tổng điểm (Sum Check) - Loại các dải số quá nhỏ hoặc quá lớn
      let sum = t.reduce((a,b) => a+b, 0);
      if(sum < minSum || sum > maxSum) continue;

      // Luật 2: Chẵn/Lẻ (Odd/Even Check) - Chỉ nhận 3:3, 4:2, 2:4
      let odds = t.filter(x => x % 2 !== 0).length;
      if(odds < 2 || odds > 4) continue;

      // Luật 3: Cao/Thấp (High/Low Check) - Chỉ nhận 3:3, 4:2, 2:4
      let highs = t.filter(x => x > midPoint).length;
      if(highs < 2 || highs > 4) continue;

      // Luật 4: Số lần lặp lại kỳ trước (Repetition) - Ép tối đa chỉ được lặp lại 1 hoặc 2 số
      let reps = t.filter(x => lastDrawNumbers.includes(x)).length;
      if(reps > 2) continue;

      // Vé qua được tất cả vòng kiểm duyệt -> Lưu vào tập mẫu
      validTickets.push(t);
  }

  // --- BƯỚC 4: CHẤM ĐIỂM BẰNG MA TRẬN TRỌNG SỐ (WEIGHTED MATRIX) ---
  // Định mức max để chuẩn hoá tỷ lệ phần trăm
  let maxF10 = Math.max(...Object.values(freq10)) || 1;
  let maxF30 = Math.max(...Object.values(freq30)) || 1;

  let scoredTickets = validTickets.map(t => {
      let score = 0;
      let pairScore = 0;
      let tripleScore = 0;

      // Chấm điểm từng con số độc lập
      for(let i = 0; i < 6; i++) {
          let n = t[i];
          let sF10 = (freq10[n] / maxF10) * 30;         // 30% Hot Number 10 kỳ
          let sF30 = (freq30[n] / maxF30) * 20;         // 20% Hot Number 30 kỳ
          let sPos = (posFreq[i][n] || 0) * 0.5;        // ~15% Phù hợp vị trí bóng
          let sMon = (monthFreq[n] > 0 ? 5 : 0);        // 5% Chu kỳ tháng
          let sGap = (gapScores[n] / 10) * 5;           // 5% Điểm rơi nhịp Gan

          score += (sF10 + sF30 + sPos + sMon + sGap);
      }

      // Chấm điểm Cặp 2 (Pair - 10%)
      for(let i = 0; i < 5; i++) {
          for(let j = i + 1; j < 6; j++) {
              pairScore += (pairFreq[t[i]][t[j]] || 0);
          }
      }

      // Chấm điểm Bộ 3 (Triple - 10%)
      for(let i = 0; i < 4; i++) {
          for(let j = i + 1; j < 5; j++) {
              for(let k = j + 1; k < 6; k++) {
                  let triKey = [t[i], t[j], t[k]].join('-');
                  tripleScore += (tripleFreq[triKey] || 0);
              }
          }
      }

      // Ép trọng số Pair và Triple vào tổng điểm chung
      score += (pairScore * 0.8) + (tripleScore * 1.5); 

      return { ticket: t, score: score };
  });

  // --- BƯỚC 5: XẾP HẠNG VÀ XUẤT RA VIP 1 & VIP 2 ---
  scoredTickets.sort((a,b) => b.score - a.score);

  let vip1 = scoredTickets[0].ticket;
  let vip2 = vip1;
  
  // Tìm VIP 2: Lấy vé tốt nhất kế tiếp nhưng phải khác VIP 1 ít nhất 2 con số để đa dạng hoá cơ hội
  for (let i = 1; i < 50; i++) {
      if (scoredTickets[i]) {
          let diffCount = scoredTickets[i].ticket.filter(x => !vip1.includes(x)).length;
          if (diffCount >= 2) {
              vip2 = scoredTickets[i].ticket;
              break;
          }
      }
  }

  return [vip1, vip2];
}

// Logic tìm Số Gan (Cold Numbers) giữ nguyên
function getColdNumbers(dataMap, sortedDates) {
   let maxLimit = currentType === 'mega' ? 45 : 55;
   let lastSeen = {};
   for(let i = 1; i <= maxLimit; i++) lastSeen[i] = -1;
   
   sortedDates.forEach((d, idx) => {
      let numbers = dataMap[d].numbers || [];
      numbers.forEach(n => { lastSeen[n] = idx; });
   });
   
   let totalDraws = sortedDates.length;
   let coldArr = [];
   for(let i = 1; i <= maxLimit; i++) {
      let gap = lastSeen[i] === -1 ? totalDraws : (totalDraws - 1 - lastSeen[i]);
      coldArr.push({ num: i, gap: gap });
   }
   coldArr.sort((a,b) => b.gap - a.gap);
   return coldArr.slice(0, 5);
}

function loadData() {
  db.collection("vietlott_" + currentType).onSnapshot((snapshot) => {
    let dataMap = {}, sortedDates = [];
    snapshot.forEach(doc => { dataMap[doc.id] = doc.data(); sortedDates.push(doc.id); });
    sortedDates.sort();

    // 1. DỰ ĐOÁN HÔM NAY
    let todayString = new Date().toISOString().slice(0, 10);
    let currentPreds = generate(dataMap, sortedDates, todayString);
    let html = "";
    currentPreds.forEach((pair, idx) => {
      html += `<div class="predict-item vip-style">
        <div style="font-size:14px; margin-bottom:8px; font-weight:bold;">🔥 VIP ${idx + 1}:</div>
        <div style="display:flex; gap:5px;">${pair.map(n => `<span class="ball">${n.toString().padStart(2,'0')}</span>`).join('')}</div>
      </div>`;
    });
    document.getElementById("predict-list").innerHTML = html;

    // 2. RENDER SỐ GAN
    let coldNums = getColdNumbers(dataMap, sortedDates);
    let coldHtml = `<div class="box"><h4>❄️ TOP 5 SỐ GAN (LÂU CHƯA VỀ)</h4>
      <div style="display:flex; gap:10px; justify-content:center; flex-wrap:wrap;">`;
    coldNums.forEach(c => {
       coldHtml += `<div style="text-align:center;">
          <span class="ball" style="background:#0c1220; border-color:#888; color:#888;">${c.num.toString().padStart(2,'0')}</span>
          <div style="font-size:10px; color:#aaa; margin-top:4px;">${c.gap} kỳ</div>
       </div>`;
    });
    coldHtml += `</div></div>`;
    document.getElementById("cold-list-container").innerHTML = coldHtml;

    // 3. KIỂM ĐỊNH LỊCH SỬ
    let histHtml = "";
    [...sortedDates].reverse().forEach((date) => {
      let actualData = dataMap[date];
      let pastDates = sortedDates.filter(d => d < date);
      
      let pastPreds = pastDates.length > 0 ? generate(dataMap, pastDates, date) : [];
      
      let matchCounts = pastPreds.map(predBalls => {
          let count = actualData.numbers.filter(n => predBalls.includes(n)).length;
          let isJP2 = false;
          if (currentType === 'power' && count === 5) {
              let unmatchedUserBalls = predBalls.filter(n => !actualData.numbers.includes(n));
              if (unmatchedUserBalls.includes(actualData.bonus)) isJP2 = true;
          }
          return { count: count, isJP2: isJP2, userBalls: predBalls };
      });
      
      let bestTicketObj = matchCounts.reduce((max, current) => {
          if(current.count > max.count) return current;
          if(current.count === max.count && current.isJP2) return current;
          return max;
      }, {count: -1, isJP2: false, userBalls: []});
      
      let matchText = pastPreds.length > 0 ? getPrize(bestTicketObj.count, bestTicketObj.isJP2) : "";
      
      histHtml += `<div style="padding:8px 0; border-bottom:1px solid #2a3a5a;">
        <div style="font-size:11px; color:#888;">📅 ${date} <span class="win-tag">${matchText}</span></div>
        <div style="display:flex; gap:4px; margin-top:4px;">
          ${actualData.numbers.map(n => {
            let isMatched = bestTicketObj.userBalls.includes(n);
            return `<span class="ball ${isMatched ? 'matched' : ''}" style="width:26px; height:26px; font-size:11px;">${n.toString().padStart(2,'0')}</span>`;
          }).join('')}
          ${actualData.bonus ? `<span class="ball ${bestTicketObj.isJP2 && bestTicketObj.userBalls.includes(actualData.bonus) ? 'matched' : ''}" style="width:26px; height:26px; font-size:11px; border-color:#ff1744;">${actualData.bonus.toString().padStart(2,'0')}</span>` : ''}
        </div>
      </div>`;
    });
    document.getElementById("history-list").innerHTML = histHtml;
  });
}
switchType('mega');
</script>
</body>
</html>
