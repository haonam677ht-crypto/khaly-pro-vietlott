.container {

.inner-bg {

h2 {

  font-size: 24px; 
  color: #d32f2f; 
  font-weight: 800;
  text-transform: uppercase; 
  margin-top: 0;
  margin-bottom: 15px; 
  letter-spacing: 1px;
  background: linear-gradient(to right, #ff1744, #ff9100);

  -webkit-text-fill-color: transparent;
}

.schedule-alert {
  background: linear-gradient(135deg, #fff3e0, #ffe082);
  border: 2px solid #ffa000;
  border-radius: 14px;
  padding: 12px;
  margin-bottom: 15px;
  text-align: center;
  font-weight: bold;
  color: #b78103;
  font-size: 15px;
  box-shadow: 0 4px 15px rgba(255, 160, 0, 0.2);
}
.schedule-alert span {
  color: #d84315;
  font-size: 17px;
  display: block;
  margin-top: 4px;
}

.tabs { display: flex; gap: 8px; margin-bottom: 15px; }
.tab-btn { 
  flex: 1; 
  padding: 12px; 
  background: #f5f5f5; 
  border: 1px solid #ddd;
  border-radius: 12px; 
  font-weight: bold; 
  cursor: pointer; 
  transition: all 0.3s ease;
  font-size: 14px;
  color: #555;
}
.tab-btn.active { 
  background: linear-gradient(135deg, #d32f2f, #ff5252); 
  color: white; 
  border-color: transparent;
  box-shadow: 0 4px 15px rgba(211, 47, 47, 0.4);
}

.auto-box { 
  background: linear-gradient(135deg, #fffde7, #fff9c4); 
  border: 2px solid #fbc02d; 
  border-radius: 16px; 
  padding: 15px; 
  margin-bottom: 18px; 
  box-shadow: 0 4px 12px rgba(251, 192, 45, 0.15);
}
.auto-box h4 { margin: 0 0 10px 0; color: #f57f17; text-align: center; font-size: 16px; letter-spacing: 0.5px; }

.ball-container { display: flex; flex-wrap: wrap; gap: 6px; margin: 5px 0; justify-content: center; }
.ball { 
  width: 36px; 
  height: 36px; 
  border-radius: 50%; 
  background: linear-gradient(135deg, #ff9100, #ff3d00); 
  color: white; 
  display: flex; 
  align-items: center; 
  justify-content: center; 
  font-weight: bold; 
  font-size: 15px; 
  box-shadow: 0 4px 8px rgba(255, 61, 0, 0.3);
}
.ball.power-bonus { 
  background: linear-gradient(135deg, #29b6f6, #0288d1); 
  box-shadow: 0 4px 8px rgba(2, 136, 209, 0.3);
}

.predict-row { 
  padding: 8px 12px; 
  border-radius: 10px; 
  margin-bottom: 8px; 
  display: flex; 
  align-items: center; 
  justify-content: space-between;

.predict-label { font-size: 13px; font-weight: bold; min-width: 55px; }

select, input { 
  width: 100%; 
  padding: 12px; 
  margin: 6px 0; 
  font-size: 16px; 
  border: 1px solid #ddd; 
  border-radius: 12px; 
  box-sizing: border-box; 
  background-color: #fafafa;

input:focus { border-color: #ff5252; outline: none; background-color: #fff; }

button {

  border-radius: 12px; 
  font-size: 16px; 
  font-weight: bold;

button:active { transform: scale(0.98); }
.save {

  margin-bottom: 15px;

.history-item { padding: 12px 0; border-bottom: 1px solid #edf2f7; }
.history-item:last-child { border-bottom: none; }

.win-tag {

  font-size: 12px; 
  font-weight: bold;

.win-g1 { background: linear-gradient(135deg, #ff6d00, #ffab40); }
.win-g2 { background: linear-gradient(135deg, #2962ff, #2979ff); }
.win-g3 { background: linear-gradient(135deg, #00c853, #b2ff59); color: #1b5e20; }

@keyframes pulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.02); }
  100% { transform: scale(1); }

  "2026-01-06": { numbers: [1, 8, 25, 30, 45, 52], bonus: 14 },
  "2026-01-03": { numbers: [6, 13, 22, 34, 41, 51], bonus: 5 },
  "2026-01-01": { numbers: [2, 8, 13, 28, 36, 55], bonus: 22 }
};

const inputsDiv = document.getElementById("inputs-6");
for(let i=0; i<6; i++){
  let input = document.createElement("input");
  input.type = "number";
  input.placeholder = "00";
  inputsDiv.appendChild(input);
}
document.getElementById("date-picker").value = new Date().toISOString().slice(0, 10);

function updateTodaySchedule() {
  const days = ["Chủ Nhật", "Thứ Hai", "Thứ Ba", "Thứ Tư", "Thứ Năm", "Thứ Sáu", "Thứ Bảy"];
  const today = new Date();
  const dayName = days[today.getDay()];
  const dayIndex = today.getDay();
  let text = (dayIndex === 3 || dayIndex === 5 || dayIndex === 0) ? `Mega 6/45` : ((dayIndex === 2 || dayIndex === 4 || dayIndex === 6) ? `Power 6/55` : `Nghỉ xổ`);
  document.getElementById("today-schedule-box").innerHTML = `📅 Hôm nay: <b>${dayName}</b> <span>💥 LỊCH XỔ: ${text.toUpperCase()} 💥</span>`;
}

async function seedHistoricalData() {
  if (!confirm("Hệ thống sẽ đồng bộ TOÀN BỘ lịch sử hàng tuần từ 01/01/2026 lên Firebase. Tiếp tục?")) return;
  try {
    for (let date in defaultMegaData) {
      await db.collection("vietlott_mega").doc(date).set({ numbers: defaultMegaData[date] });
    }
    for (let date in defaultPowerData) {
      await db.collection("vietlott_power").doc(date).set(defaultPowerData[date]);
    }
    alert("🚀 Thành công! Đã nạp trọn bộ dữ liệu lịch sử năm 2026 lên Firebase của bạn!");
  } catch (error) {
    alert("Lỗi Firebase: " + error.message);
  }
}

function switchType(type) {
  currentType = type;
  document.getElementById("tab-mega").classList.toggle("active", type === 'mega');
  document.getElementById("tab-power").classList.toggle("active", type === 'power');
  document.getElementById("power-bonus-area").style.display = type === 'power' ? 'flex' : 'none';
  document.getElementById("predict-title").innerText = `🔮 6 CẶP SỐ AI DỰ ĐOÁN ${type.toUpperCase()} HÔM NAY`;
  listenToFirebaseRealtime();
}

function generateFixedPredictionsForDate(dateStr, type, historicalData = []) {
  let maxNum = type === 'mega' ? 45 : 55;
  let seed = dateStr.split('-').reduce((acc, val) => acc + parseInt(val), 0) + (type === 'mega' ? 15 : 35);
  function seededRandom() {
    let x = Math.sin(seed++) * 10000;
    return x - Math.floor(x);
  }
  let frequencyMap = {};
  if (historicalData.length > 0) {
    historicalData.forEach(nums => {
      if(nums) nums.forEach(n => { frequencyMap[n] = (frequencyMap[n] || 0) + 1; });
    });
  }
  let pairs = [];
  while(pairs.length < 6) {
    let set = new Set();
    while(set.size < 6) {
      let num = Math.floor(seededRandom() * maxNum) + 1;
      set.add(num);
    }
    let sortedArr = Array.from(set).sort((a,b) => a-b);
    let pairScore = sortedArr.reduce((sum, n) => sum + (frequencyMap[n] || 0), 0);
    pairScore += seededRandom() * 15; 
    pairs.push({ numbers: sortedArr, score: pairScore });
  }
  pairs.sort((a, b) => b.score - a.score);
  return pairs;
}

async function fetchVietlottAPI() {
  let max = currentType === 'mega' ? 45 : 55;
  let mockNums = [];
  while(mockNums.length < 6) {
    let n = Math.floor(Math.random() * max) + 1;
    if(!mockNums.includes(n)) mockNums.push(n);
  }
  mockNums.sort((a,b) => a-b);
  let inputs = document.querySelectorAll("#inputs-6 input");
  inputs.forEach((inp, idx) => inp.value = mockNums[idx]);
  if(currentType === 'power') document.getElementById("input-bonus").value = Math.floor(Math.random() * 55) + 1;
  alert("Cập nhật tự động hoàn tất!");
}

async function saveManualData() {
  let date = document.getElementById("date-picker").value;
  let inputs = [...document.querySelectorAll("#inputs-6 input")].map(i => parseInt(i.value)).filter(x => !isNaN(x));
  if(inputs.length < 6) return alert("Hãy nhập đủ 6 số!");
  let dataPayload = { numbers: inputs.sort((a,b)=>a-b) };
  if(currentType === 'power') {
    let bonus = parseInt(document.getElementById("input-bonus").value);
    if(isNaN(bonus)) return alert("Nhập số đặc biệt!");
    dataPayload.bonus = bonus;
  }
  await db.collection(`vietlott_${currentType}`).doc(date).set(dataPayload);
  alert("Lưu dữ liệu thành công!");
}

function checkWinning(predPair, officialNums, bonusNum, type) {
  if (!officialNums) return null;
  let matchCount = predPair.filter(n => officialNums.includes(n)).length;
  if(type === 'mega') {
    if(matchCount === 6) return { name: "🔥 TRÚNG JACKPOT 💥", class: "win-jackpot" };
    if(matchCount === 5) return { name: "⭐ GIẢI NHẤT (10 Tr)", class: "win-g1" };
    if(matchCount === 4) return { name: "✅ GIẢI NHÌ (300k)", class: "win-g2" };
    if(matchCount === 3) return { name: "✨ GIẢI BA (30k)", class: "win-g3" };
  } else {
    if(matchCount === 6) return { name: "💥 TRÚNG JACKPOT 1 💥", class: "win-jackpot" };
    if(matchCount === 5 && bonusNum && predPair.includes(bonusNum)) return { name: "🔥 TRÚNG JACKPOT 2 💥", class: "win-jackpot" };
    if(matchCount === 5) return { name: "⭐ GIẢI NHẤT (40 Tr)", class: "win-g1" };
    if(matchCount === 4) return { name: "✅ GIẢI NHÌ (500k)", class: "win-g2" };
    if(matchCount === 3) return { name: "✨ GIẢI BA (50k)", class: "win-g3" };
  }
  return null;
}

function listenToFirebaseRealtime() {
  if (unsubscribeRealtime) unsubscribeRealtime();
  let todayStr = document.getElementById("date-picker").value;

  unsubscribeRealtime = db.collection(`vietlott_${currentType}`).onSnapshot((snapshot) => {
    let firebaseMap = {};
    snapshot.forEach(doc => { firebaseMap[doc.id] = doc.data(); });

    let finalRecordsMap = {};
    if (currentType === 'mega') {
      for (let d in defaultMegaData) { finalRecordsMap[d] = { numbers: defaultMegaData[d] }; }
    } else {
      for (let d in defaultPowerData) { finalRecordsMap[d] = defaultPowerData[d]; }
    }
    for (let d in firebaseMap) { finalRecordsMap[d] = firebaseMap[d]; }

    let historicalList = [];
    let records = [];
    for (let date in finalRecordsMap) {
      let d = finalRecordsMap[date];
      if (d && d.numbers) {
        historicalList.push(d.numbers);
        records.push({ date: date, ...d });
      }
    }

    let currentDayPredictions = generateFixedPredictionsForDate(todayStr, currentType, historicalList);
    let predictHtml = "";
    currentDayPredictions.forEach((pairObj, idx) => {
      let pair = pairObj.numbers;
      let isTopPick = idx < 2; 
      let rowStyle = isTopPick 
        ? `border: 2px solid #d32f2f; background: linear-gradient(135deg, #ffebee, #fff); box-shadow: 0 4px 10px rgba(211, 47, 47, 0.15);` 
        : `border: 1px solid #ffe082; background: rgba(255,255,255,0.7);`;
      let labelHtml = isTopPick 
        ? `<span class="predict-label" style="color:#d32f2f; font-weight: bold;">🔥 VIP ${idx+1}:</span>` 
        : `<span class="predict-label">Cặp ${idx+1}:</span>`;

      predictHtml += `
        <div class="predict-row" style="${rowStyle}">
          ${labelHtml}
          <div class="ball-container">
            ${pair.map(n => `<span class="ball" style="${isTopPick ? 'background: linear-gradient(135deg, #d32f2f, #ff5252);' : ''}">${n.toString().padStart(2,'0')}</span>`).join('')}
          </div>
        </div>`;
    });
    document.getElementById("predict-list").innerHTML = predictHtml;

    records.sort((a, b) => b.date.localeCompare(a.date));
    let historyHtml = "";
    records.forEach(rec => {
      let official = rec.numbers;
      let bonus = rec.bonus || null;
      let pastPredictions = generateFixedPredictionsForDate(rec.date, currentType, historicalList);
      let winDetails = [];

      pastPredictions.forEach((predPairObj, i) => {
        let winStatus = checkWinning(predPairObj.numbers, official, bonus, currentType);
        if(winStatus) winDetails.push(`<span class="win-tag ${winStatus.class}">🎉 Cặp ${i+1} trúng ${winStatus.name}</span>`);
      });

      let resultStatusText = winDetails.length > 0 
        ? `<div style="margin-top:5px; display:flex; flex-direction:column; gap:4px;">${winDetails.join('')}</div>`
        : `<div style="margin-top:5px; color:#aaa; font-size:13px; font-style:italic;">❌ Chưa trúng giải lớn</div>`;

      historyHtml += `
        <div class="history-item">
          <div style="font-weight:bold; color:#1565c0;">📅 Kỳ quay: ${rec.date}</div>
          <div style="margin:5px 0; display:flex; align-items:center; gap:8px;">
            <div class="ball-container">
              ${official.map(n => `<span class="ball" style="background:linear-gradient(135deg, #4caf50, #2e7d32); width:30px; height:30px; font-size:13px;">${n.toString().padStart(2,'0')}</span>`).join('')}
              ${bonus ? `<span class="ball power-bonus" style="width:30px; height:30px; font-size:13px;">${bonus.toString().padStart(2,'0')}</span>` : ''}
            </div>
          </div>
          ${resultStatusText}
        </div>`;
    });
    document.getElementById("history-list").innerHTML = historyHtml;
  });
}

document.getElementById("date-picker").addEventListener("change", listenToFirebaseRealtime);
window.onload = () => { updateTodaySchedule(); listenToFirebaseRealtime(); };
</script>
