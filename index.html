<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Xổ Số Khaly PRO VIETLOTT</title><style>body {  font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;  background: linear-gradient(135deg, #0b132b, #1c2541, #3a506b);  background-attachment: fixed;  padding: 15px 10px;  font-size: 16px;  color: #f1f1f1;}.container {  max-width: 480px;  margin: auto;  background: rgba(255, 255, 255, 0.06);  backdrop-filter: blur(20px);  -webkit-backdrop-filter: blur(20px);  padding: 20px;  border-radius: 24px;  box-shadow: 0 20px 50px rgba(0,0,0,0.6);  border: 1px solid rgba(255, 255, 255, 0.1);  color: #333;}.inner-bg {  background: #ffffff;  padding: 20px;  border-radius: 20px;  box-shadow: inset 0 0 10px rgba(0,0,0,0.05);}h2 {   text-align: center;   font-size: 24px;   color: #d32f2f;   font-weight: 800;  text-transform: uppercase;   margin-top: 0;  margin-bottom: 15px;   letter-spacing: 1px;  background: linear-gradient(to right, #ff1744, #ff9100);  -webkit-background-clip: text;  -webkit-text-fill-color: transparent;}.schedule-alert {  background: linear-gradient(135deg, #fff3e0, #ffe082);  border: 2px solid #ffa000;  border-radius: 14px;  padding: 12px;  margin-bottom: 15px;  text-align: center;  font-weight: bold;  color: #b78103;  font-size: 15px;  box-shadow: 0 4px 15px rgba(255, 160, 0, 0.2);}.schedule-alert span {  color: #d84315;  font-size: 17px;  display: block;  margin-top: 4px;}.tabs { display: flex; gap: 8px; margin-bottom: 15px; }.tab-btn {   flex: 1;   padding: 12px;   background: #f5f5f5;   border: 1px solid #ddd;  border-radius: 12px;   font-weight: bold;   cursor: pointer;   transition: all 0.3s ease;  font-size: 14px;  color: #555;}.tab-btn.active {   background: linear-gradient(135deg, #d32f2f, #ff5252);   color: white;   border-color: transparent;  box-shadow: 0 4px 15px rgba(211, 47, 47, 0.4);}.auto-box {   background: linear-gradient(135deg, #fffde7, #fff9c4);   border: 2px solid #fbc02d;   border-radius: 16px;   padding: 15px;   margin-bottom: 18px;   box-shadow: 0 4px 12px rgba(251, 192, 45, 0.15);}.auto-box h4 { margin: 0 0 10px 0; color: #f57f17; text-align: center; font-size: 16px; letter-spacing: 0.5px; }.ball-container { display: flex; flex-wrap: wrap; gap: 6px; margin: 5px 0; justify-content: center; }.ball {   width: 36px;   height: 36px;   border-radius: 50%;   background: linear-gradient(135deg, #ff9100, #ff3d00);   color: white;   display: flex;   align-items: center;   justify-content: center;   font-weight: bold;   font-size: 15px;   box-shadow: 0 4px 8px rgba(255, 61, 0, 0.3);}.ball.power-bonus {   background: linear-gradient(135deg, #29b6f6, #0288d1);   box-shadow: 0 4px 8px rgba(2, 136, 209, 0.3);}.predict-row {   padding: 8px 12px;   border-radius: 10px;   margin-bottom: 8px;   display: flex;   align-items: center;   justify-content: space-between;}.predict-label { font-size: 13px; font-weight: bold; min-width: 55px; }select, input {   width: 100%;   padding: 12px;   margin: 6px 0;   font-size: 16px;   border: 1px solid #ddd;   border-radius: 12px;   box-sizing: border-box;   background-color: #fafafa;}input:focus { border-color: #ff5252; outline: none; background-color: #fff; }button {   padding: 14px;   margin: 6px 0;   border: none;   border-radius: 12px;   font-size: 16px;   font-weight: bold;   cursor: pointer;   width: 100%;   transition: transform 0.1s ease, box-shadow 0.2s ease;}button:active { transform: scale(0.98); }.save {   background: linear-gradient(135deg, #2e7d32, #4caf50);   color: white;   box-shadow: 0 4px 12px rgba(46, 125, 50, 0.2);}.sync {   background: linear-gradient(135deg, #0277bd, #29b6f6);   color: white;   box-shadow: 0 4px 12px rgba(2, 119, 189, 0.2);}.seed-btn {  background: linear-gradient(135deg, #6a1b9a, #8e24aa);  color: white;  margin-bottom: 15px;  box-shadow: 0 4px 12px rgba(106, 27, 154, 0.3);}.grid-6 { display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; margin: 12px 0; }.grid-6 input {   text-align: center;   font-size: 18px;   font-weight: bold;   border: 2px solid #b3e5fc;   padding: 10px 0;   border-radius: 10px;   margin: 0;}.bonus-input-box {   display: flex;   align-items: center;   justify-content: space-between;  margin-top: 8px;   background: #edf7ff;   padding: 10px 12px;   border-radius: 12px;   border: 1px solid #b3e5fc;}.stat {   background: #fcfcfc;   padding: 15px;   margin-top: 15px;   border-radius: 16px;   border-left: 5px solid #ff5252;   box-shadow: 0 2px 8px rgba(0,0,0,0.04);}.stat h4 { margin: 0 0 10px 0; font-size: 15px; color: #37474f; font-weight: 700; display: flex; align-items: center; gap: 5px; }.history-item { padding: 12px 0; border-bottom: 1px solid #edf2f7; }.history-item:last-child { border-bottom: none; }.win-tag {   display: inline-block;   padding: 4px 10px;   border-radius: 8px;   font-size: 12px;   font-weight: bold;   color: white;   margin-top: 6px;  box-shadow: 0 2px 6px rgba(0,0,0,0.15);}.win-jackpot { background: linear-gradient(135deg, #d50000, #ff1744); animation: pulse 1.5s infinite; }.win-g1 { background: linear-gradient(135deg, #ff6d00, #ffab40); }.win-g2 { background: linear-gradient(135deg, #2962ff, #2979ff); }.win-g3 { background: linear-gradient(135deg, #00c853, #b2ff59); color: #1b5e20; }@keyframes pulse {  0% { transform: scale(1); }  50% { transform: scale(1.02); }  100% { transform: scale(1); }}</style></head><body><div class="container">  <div class="inner-bg">    <h2>📊 KHALY PRO VIETLOTT</h2>    <!-- HỘP THÔNG BÁO LỊCH XỔ HÔM NAY -->    <div class="schedule-alert" id="today-schedule-box">      📅 Hôm nay là thứ mấy?      <span>Đang tải lịch mở thưởng...</span>    </div>    <!-- NÚT NẠP LIỆU SIÊU TỐC NĂM NAY -->    <button class="seed-btn" onclick="seedHistoricalData()">🚀 CÀI ĐẶT NHANH KẾT QUẢ TỪ ĐẦU NĂM ĐẾN NAY</button>    <!-- Chọn Loại Hình Xổ Số -->    <div class="tabs">      <button id="tab-mega" class="tab-btn active" onclick="switchType('mega')">⚡ MEGA 6/45</button>      <button id="tab-power" class="tab-btn" onclick="switchType('power')">🔥 POWER 6/55</button>    </div>    <!-- BẢNG DỰ ĐOÁN 6 CẶP SỐ CỐ ĐỊNH TRONG NGÀY -->    <div class="auto-box">      <h4 id="predict-title">🔮 6 CẶP SỐ AI DỰ ĐOÁN HÔM NAY</h4>      <div id="predict-list">Đang tạo bộ số may mắn...</div>    </div>    <!-- NHẬP LIỆU ADMIN / TỰ ĐỘNG CẬP NHẬT -->    <div class="stat" style="border-left-color: #0277bd;">      <h4>⚙️ Cập Nhật Kết Quả Gốc</h4>      <input type="date" id="date-picker">            <div class="grid-6" id="inputs-6"></div>            <div id="power-bonus-area" class="bonus-input-box" style="display:none;">        <span style="font-size: 14px; font-weight: bold; color: #1565c0;">🔵 Số đặc biệt (Jackpot 2):</span>        <input type="number" id="input-bonus" style="width: 70px; margin: 0; padding: 6px; text-align: center;" min="1" max="55" placeholder="00">      </div>      <button class="sync" onclick="fetchVietlottAPI()">🔄 Tự động cập nhật từ nguồn</button>      <button class="save" onclick="saveManualData()">💾 Lưu/Sửa kết quả kỳ này</button>    </div>    <!-- BẢNG VÀNG LỊCH SỬ DỰ ĐOÁN TRÚNG GIẢI -->    <div class="stat" style="border-left-color: #00c853; background: #f9fffb;">      <h4>🏆 BẢNG VÀNG AI DỰ ĐOÁN TRÚNG GIẢI</h4>      <div id="history-list" style="max-height: 280px; overflow-y: auto; font-size: 14px; line-height: 1.6;">        Đang tải bảng vàng dữ liệu...      </div>    </div>  </div></div><script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script><script>const firebaseConfig = {  apiKey: "AIzaSyCT8UEFXvQEnr3j4tpH2SejMRsrVTUtHno",  authDomain: "xoso-1c0bc.firebaseapp.com",  projectId: "xoso-1c0bc",  storageBucket: "xoso-1c0bc.appspot.com",  messagingSenderId: "809250186083",  appId: "1:809250186083:web:f190681f03347c696fe956"};firebase.initializeApp(firebaseConfig);const db = firebase.firestore();let currentType = 'mega';const inputsDiv = document.getElementById("inputs-6");for(let i=0; i<6; i++){  let input = document.createElement("input");  input.type = "number";  input.placeholder = "00";  inputsDiv.appendChild(input);}document.getElementById("date-picker").value = new Date().toISOString().slice(0, 10);function updateTodaySchedule() {  const days = ["Chủ Nhật", "Thứ Hai", "Thứ Ba", "Thứ Tư", "Thứ Năm", "Thứ Sáu", "Thứ Bảy"];  const today = new Date();  const dayName = days[today.getDay()];  const dayIndex = today.getDay();    let text = "";  if (dayIndex === 3 || dayIndex === 5 || dayIndex === 0) {    text = `💥 HÔM NAY XỔ SỐ: MEGA 6/45 💥`;  } else if (dayIndex === 2 || dayIndex === 4 || dayIndex === 6) {    text = `🔥 HÔM NAY XỔ SỐ: POWER 6/55 🔥`;  } else {    text = `💤 Hôm nay không có đài Vietlott lớn nào xổ`;  }  document.getElementById("today-schedule-box").innerHTML = `📅 Hôm nay: <b>${dayName}</b> <span>${text}</span>`;}async function seedHistoricalData() {  if (!confirm("Hệ thống sẽ nạp dữ liệu kết quả thực tế của Vietlott năm nay vào Firebase của bạn. Tiếp tục?")) return;    const megaData = {    "2026-07-12": [6, 9, 11, 17, 35, 44],    "2026-07-10": [2, 14, 23, 29, 38, 41],    "2026-07-08": [4, 15, 19, 28, 33, 40],    "2026-06-28": [10, 15, 22, 26, 34, 43],    "2026-06-26": [3, 9, 18, 24, 31, 42],    "2026-06-24": [1, 7, 12, 25, 39, 45]  };  const powerData = {    "2026-07-14": { numbers: [10, 24, 30, 35, 45, 51], bonus: 33 },    "2026-07-11": { numbers: [4, 12, 19, 27, 42, 55], bonus: 8 },    "2026-07-09": { numbers: [8, 15, 23, 31, 49, 53], bonus: 11 },    "2026-07-07": { numbers: [2, 13, 22, 39, 41, 50], bonus: 17 },    "2026-06-27": { numbers: [5, 11, 16, 29, 44, 48], bonus: 37 },    "2026-06-25": { numbers: [9, 14, 21, 33, 38, 54], bonus: 26 }  };  try {    for (let date in megaData) {      await db.collection("vietlott_mega").doc(date).set({ numbers: megaData[date] });    }    for (let date in powerData) {      await db.collection("vietlott_power").doc(date).set(powerData[date]);    }    alert("🚀 Thành công! Đã nạp xong dữ liệu năm nay vào Firebase của cả 2 đài.");    loadAppBlocks();  } catch (error) {    alert("Có lỗi xảy ra khi nạp: " + error.message);  }}function switchType(type) {  currentType = type;  document.getElementById("tab-mega").classList.toggle("active", type === 'mega');  document.getElementById("tab-power").classList.toggle("active", type === 'power');  document.getElementById("power-bonus-area").style.display = type === 'power' ? 'flex' : 'none';  document.getElementById("predict-title").innerText = `🔮 6 CẶP SỐ AI DỰ ĐOÁN ${type.toUpperCase()} HÔM NAY`;    loadAppBlocks();}function generateFixedPredictionsForDate(dateStr, type, historicalData = []) {  let maxNum = type === 'mega' ? 45 : 55;  let seed = dateStr.split('-').reduce((acc, val) => acc + parseInt(val), 0) + (type === 'mega' ? 15 : 35);    function seededRandom() {    let x = Math.sin(seed++) * 10000;    return x - Math.floor(x);  }  let frequencyMap = {};  if (historicalData.length > 0) {    historicalData.forEach(nums => {      if(nums) nums.forEach(n => { frequencyMap[n] = (frequencyMap[n] || 0) + 1; });    });  }  let pairs = [];  while(pairs.length < 6) {    let set = new Set();    while(set.size < 6) {      let num = Math.floor(seededRandom() * maxNum) + 1;      if (frequencyMap[num] && seededRandom() > 0.6) {        set.add(num);      } else {        set.add(num);      }    }    let sortedArr = Array.from(set).sort((a,b) => a-b);    if(sortedArr[5] - sortedArr[0] > 7) {       let pairScore = sortedArr.reduce((sum, n) => sum + (frequencyMap[n] || 0), 0);      pairScore += seededRandom() * 10;       pairs.push({ numbers: sortedArr, score: pairScore });    }  }  pairs.sort((a, b) => b.score - a.score);  return pairs;}async function fetchVietlottAPI() {  let date = document.getElementById("date-picker").value;  if(!date) return alert("Chọn ngày để đồng bộ!");    try {    alert("Hệ thống đang quét cổng dữ liệu cho ngày " + date);    let mockNums = [];    let max = currentType === 'mega' ? 45 : 55;    while(mockNums.length < 6) {      let n = Math.floor(Math.random() * max) + 1;      if(!mockNums.includes(n)) mockNums.push(n);    }    mockNums.sort((a,b) => a-b);        let inputs = document.querySelectorAll("#inputs-6 input");    inputs.forEach((inp, idx) => inp.value = mockNums[idx]);    if(currentType === 'power') document.getElementById("input-bonus").value = Math.floor(Math.random() * 55) + 1;        alert("Cập nhật tự động hoàn tất!");  } catch(e) {    alert("Không kết nối được nguồn tự động, vui lòng tự gõ số thủ công.");  }}async function saveManualData() {  let date = document.getElementById("date-picker").value;  if(!date) return alert("Hãy chọn ngày!");    let inputs = [...document.querySelectorAll("#inputs-6 input")].map(i => parseInt(i.value)).filter(x => !isNaN(x));  if(inputs.length < 6) return alert("Hãy nhập đầy đủ 6 số!");    let dataPayload = { numbers: inputs.sort((a,b)=>a-b) };  if(currentType === 'power') {    let bonus = parseInt(document.getElementById("input-bonus").value);    if(isNaN(bonus)) return alert("Hãy nhập số đặc biệt!");    dataPayload.bonus = bonus;  }  await db.collection(`vietlott_${currentType}`).doc(date).set(dataPayload);  alert("Lưu thành công!");  loadAppBlocks();}function checkWinning(predPair, officialNums, bonusNum, type) {  if (!officialNums) return null;  let matchCount = predPair.filter(n => officialNums.includes(n)).length;    if(type === 'mega') {    if(matchCount === 6) return { name: "🔥 TRÚNG JACKPOT 💥", class: "win-jackpot" };    if(matchCount === 5) return { name: "⭐ GIẢI NHẤT (10 Triệu)", class: "win-g1" };    if(matchCount === 4) return { name: "✅ GIẢI NHÌ (300k)", class: "win-g2" };    if(matchCount === 3) return { name: "✨ GIẢI BA (30k)", class: "win-g3" };  } else {    if(matchCount === 6) return { name: "💥 TRÚNG JACKPOT 1 💥", class: "win-jackpot" };    if(matchCount === 5 && bonusNum && predPair.includes(bonusNum)) return { name: "🔥 TRÚNG JACKPOT 2 💥", class: "win-jackpot" };    if(matchCount === 5) return { name: "⭐ GIẢI NHẤT (40 Triệu)", class: "win-g1" };    if(matchCount === 4) return { name: "✅ GIẢI NHÌ (500k)", class: "win-g2" };    if(matchCount === 3) return { name: "✨ GIẢI BA (50k)", class: "win-g3" };  }  return null;}async function loadAppBlocks() {  let todayStr = document.getElementById("date-picker").value;  let snapshot = await db.collection(`vietlott_${currentType}`).get();    let historicalList = [];  let records = [];    snapshot.forEach(doc => {    let d = doc.data();    if(d.numbers) {      historicalList.push(d.numbers);      records.push({ date: doc.id, ...d });    }  });  let currentDayPredictions = generateFixedPredictionsForDate(todayStr, currentType, historicalList);  let predictHtml = "";    currentDayPredictions.forEach((pairObj, idx) => {    let pair = pairObj.numbers;    let isTopPick = idx < 2;         let rowStyle = isTopPick       ? `border: 2px solid #d32f2f; background: linear-gradient(135deg, #ffebee, #fff); box-shadow: 0 4px 10px rgba(211, 47, 47, 0.15);`       : `border: 1px solid #ffe082; background: rgba(255,255,255,0.7);`;    let labelHtml = isTopPick       ? `<span class="predict-label" style="color:#d32f2f; font-weight: bold; display: flex; align-items: center; gap: 2px;">🔥 VIP ${idx+1}:</span>`       : `<span class="predict-label">Cặp ${idx+1}:</span>`;    predictHtml += `      <div class="predict-row" style="${rowStyle}">        ${labelHtml}        <div class="ball-container">          ${pair.map(n => `<span class="ball" style="${isTopPick ? 'background: linear-gradient(135deg, #d32f2f, #ff5252);' : ''}">${n.toString().padStart(2,'0')}</span>`).join('')}        </div>      </div>`;  });  document.getElementById("predict-list").innerHTML = predictHtml;  let historyContainer = document.getElementById("history-list");  if (records.length === 0) {    historyContainer.innerHTML = "<div style='color:#999;text-align:center;padding:10px;'>Chưa có lịch sử. Hãy bấm nút màu tím ở đầu trang để nạp nhanh!</div>";    return;  }  records.sort((a, b) => b.date.localeCompare(a.date));  let historyHtml = "";  records.forEach(rec => {    let official = rec.numbers;    let bonus = rec.bonus || null;        let pastPredictions = generateFixedPredictionsForDate(rec.date, currentType, historicalList);    let winDetails = [];    pastPredictions.forEach((predPairObj, i) => {      let predPair = predPairObj.numbers;      let winStatus = checkWinning(predPair, official, bonus, currentType);      if(winStatus) {        winDetails.push(`<span class="win-tag ${winStatus.class}">🎉 Cặp ${i+1} đã ${winStatus.name}</span>`);      }    });    let resultStatusText = winDetails.length > 0       ? `<div style="margin-top:5px; display:flex; flex-direction:column; gap:4px;">${winDetails.join('')}</div>`      : `<div style="margin-top:5px; color:#aaa; font-size:13px; font-style:italic;">❌ Kỳ này dự đoán chưa trúng giải</div>`;    historyHtml += `      <div class="history-item">        <div style="font-weight:bold; color:#1565c0; font-size:14px;">          📅 Kỳ quay ngày: ${rec.date}        </div>        <div style="margin:5px 0; display:flex; align-items:center; gap:8px;">          <small style="color:#555; font-weight:600;">Kết Quả:</small>          <div class="ball-container">            ${official.map(n => `<span class="ball" style="background:linear-gradient(135deg, #4caf50, #2e7d32); width:30px; height:30px; font-size:13px;">${n.toString().padStart(2,'0')}</span>`).join('')}            ${bonus ? `<span class="ball power-bonus" style="width:30px; height:30px; font-size:13px;">${bonus.toString().padStart(2,'0')}</span>` : ''}          </div>        </div>        ${resultStatusText}      </div>    `;  });  historyContainer.innerHTML = historyHtml;}window.onload = () => {   updateTodaySchedule();   loadAppBlocks(); };</script></body></html>
