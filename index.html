<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<!-- THÊM VIEWPORT CHUẨN ĐỂ APP KHÔNG BỊ CO GIÃN SAI -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Khaly Pro Vietlott</title>
<style>
  :root { --bg: #0a0a0a; --panel: #161616; --accent: #ff3e3e; --text: #e0e0e0; }
  
  /* ÉP APP FULL MÀN HÌNH VÀ KHÔNG BỊ TRÀN */
  html, body { 
    margin: 0; padding: 0; 
    height: 100%; width: 100%; 
    background: var(--bg); 
    color: var(--text); 
    font-family: 'Segoe UI', sans-serif;
    overflow: hidden; /* Chặn cuộn cả trang */
  }
  
  .app-wrapper {
    height: 100vh; width: 100vw;
    display: flex; flex-direction: column;
    overflow-y: auto; /* Chỉ cho phép cuộn nội dung bên trong */
    padding: 10px; box-sizing: border-box;
  }

  .container { max-width: 480px; margin: auto; width: 100%; }
  
  h2 { color: var(--accent); text-align: center; text-transform: uppercase; margin-bottom: 15px; font-weight: 800; }
  
  .box { 
    background: var(--panel); border: 1px solid #333; padding: 15px; border-radius: 16px; 
    margin-bottom: 15px; border-left: 4px solid var(--accent);
  }
  
  .predict-item { border-bottom: 1px solid #333; padding: 8px 0; }
  .ball { width: 28px; height: 28px; background: #222; border: 1px solid var(--accent); color: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 12px; }
  
  input, textarea { background: #000; border: 1px solid #444; color: #fff; padding: 10px; border-radius: 8px; width: 100%; box-sizing: border-box; }
  .grid-6 { display: grid; grid-template-columns: repeat(6, 1fr); gap: 5px; margin: 8px 0; }
  .grid-6 input { background: #000; border: 1px solid var(--accent); text-align: center; color: var(--accent); font-weight: bold; padding: 8px 0; }
  
  button { padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; margin: 5px 0; }
  .save { background: var(--accent); color: #fff; }
  .delete { background: #333; color: #888; }
  .btn-paste { background: #222; color: #fff; border: 1px solid #444; }
</style>
</head>
<body>
<div class="app-wrapper">
  <div class="container">
    <h2>KHALY PRO VIETLOTT</h2>
    <div id="predict-list" class="box"></div>

    <div class="box">
      <h4>⚙️ Tự Nhập Kết Quả</h4>
      <input type="date" id="date-picker">
      <textarea id="pasteInput" placeholder="Dán chuỗi số..."></textarea>
      <button class="btn-paste" onclick="pasteVietlottNumbers()">📥 Dán nhanh</button>
      <div class="grid-6" id="inputs-6"></div>
      <button class="save" onclick="saveManualData()">💾 Lưu</button>
      <button class="delete" onclick="deleteManualData()">🗑 Xoá</button>
    </div>

    <div class="box">
      <h4>📜 Lịch sử</h4>
      <div id="history-list"></div>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
<script>
  // ... (Giữ nguyên logic JavaScript cũ của bạn tại đây)
</script>
</body>
</html>
